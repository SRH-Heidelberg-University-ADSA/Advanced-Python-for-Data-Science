apiVersion: apps/v1
kind: Deployment

metadata:
  # Name of the Kubernetes Deployment.
  name: flask-deployment

spec:
  # Number of identical Pods Kubernetes should maintain.
  replicas: 2

  selector:
    # Select Pods with this label.
    matchLabels:
      app: flask-app

  template:
    metadata:
      # Label assigned to created Pods.
      labels:
        app: flask-app

    spec:
      containers:
        - name: flask-container

          # Docker image used to create the container.
          image: flask-week6:latest

          # Use the local image if it already exists.
          imagePullPolicy: IfNotPresent

          # Port exposed by the Flask application.
          ports:
            - containerPort: 5000

          # Application configuration.
          env:
            - name: APP_VERSION
              value: "1.0.0"

          # Check whether the application is ready to receive traffic.
          readinessProbe:
            httpGet:
              path: /health
              port: 5000

            # Wait before starting health checks.
            initialDelaySeconds: 3

            # Run the health check every 5 seconds.
            periodSeconds: 5